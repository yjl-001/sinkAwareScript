# 主运行流程配置：数据、模型、生成、反事实评估相关参数放这里。
cfg_path: configs/latent_memory/kodcode.yaml
workflow: candidate
experiment_config: sinkAwareScript/MVP/configs/first_key_sink_three_groups.yaml
viz_config: sinkAwareScript/MVP/configs/viz_default.yaml
trigger_trace_config: sinkAwareScript/MVP/configs/trigger_trace_default.yaml

load_model_path: null
output_dir: output/sink_aware_mvp/kodcode
split: test
limit: 20
start_index: 0
seed: 42
device: auto
torch_dtype: bfloat16
attn_implementation: eager

max_new_tokens: 256
budget: 5
# 0 表示保留全部 delimiter candidates。设成正数只用于 debug，
# 会改变 sink top-k 的候选池，因此正式实验不要截断。
max_candidates_per_sample: 0
temperature: 0.0
do_sample: false

sink_key_count: 8
sink_layer_window: 0
random_trials: 3
run_strategy_rollouts: false
overwrite: false

# 传给 MemGen 原始 config 的 OmegaConf dotlist 覆盖项。
options: null
