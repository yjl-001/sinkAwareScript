# 训练后 Trigger 的在线插入位置可视化与 candidate 分组统计。
# 不计算 SinkMass；sink score 严格定义为对第一个有效 key 的平均 attention。
trigger_trace:
  trigger_active: true
  trigger_do_sample: false
  trigger_temperature: 1.0
  checkpoint_label: trained_trigger

  # 在每个实际经过 Trigger 判定的 inference delimiter candidate 上，采集
  # 插入前 first_key_attention，并比较真实插入与未插入两组。
  collect_candidate_sink_scores: true
  sink_score_layer_window: 4
  save_sink_score_comparison_plot: true

  # prompt augmentation 与 delimiter 后的 inference augmentation 分目录保存。
  save_prompt_heatmap: false
  save_inserted_heatmaps: true
  save_not_inserted_heatmaps: false
  max_inserted_heatmaps_per_sample: 0
  max_not_inserted_heatmaps_per_sample: 5

  # 与当前 MVP candidate heatmap 一致：按 head 平均，行保留真实 layer id。
  heatmap_layer_window: 4
  save_contact_sheet: true
  contact_sheet_columns: 2
